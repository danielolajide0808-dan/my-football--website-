<!DOCTYPE html>
<html>
<head>
    <title>My Football Website</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(green, black);
            color: white;
            transition: 0.5s;
        }

        .light-mode {
            background: white;
            color: black;
        }

        .navbar {
            background: black;
            padding: 15px;
            text-align: center;
        }

        .navbar a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        .navbar a:hover {
            color: lime;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        .card {
            background: rgba(0,0,0,0.6);
            margin: 20px;
            padding: 20px;
            border-radius: 10px;
        }

        button {
            padding: 10px;
            border: none;
            background: lime;
            font-weight: bold;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>

<body id="body">

    <div class="navbar">
        <a href="index.html">Home</a>
        <a href="players.html">Players</a>
        <a href="scores.html">Scores</a>
    </div>

    <div class="container">
        <h1>⚽ My Football Website ⚽</h1>

        <!-- Live Score Section -->
        <div class="card">
            <h2>📊 Live Score</h2>
            <p id="live-score">Loading live scores...</p>
        </div>

        <!-- Dark / Light Mode -->
        <div class="card">
            <h2>🌙 Theme</h2>
            <button onclick="toggleMode()">Toggle Dark/Light Mode</button>
        </div>
    </div>

    <script>
        // --- DARK / LIGHT MODE ---
        function toggleMode() {
            document.getElementById("body").classList.toggle("light-mode");
        }

        // --- LIVE SCORES ---
        const apiKey = "YOUR_API_KEY_HERE"; // <-- Replace with your Football-Data.org API key
        const matchIds = [264673, 264674, 264675]; // <-- Example match IDs, can add multiple

        async function fetchLiveScores() {
            try {
                let results = "";
                for (const id of matchIds) {
                    const response = await fetch(`https://api.football-data.org/v4/matches/${id}`, {
                        headers: { 'X-Auth-Token': apiKey }
                    });
                    const data = await response.json();
                    const homeTeam = data.match.homeTeam.name;
                    const awayTeam = data.match.awayTeam.name;
                    const homeScore = data.match.score.fullTime.home;
                    const awayScore = data.match.score.fullTime.away;

                    results += `${homeTeam} ${homeScore} - ${awayScore} ${awayTeam} ⚽🔥\n`;
                }
                document.getElementById("live-score").innerText = results;
            } catch (error) {
                console.error("Error fetching score:", error);
                document.getElementById("live-score").innerText = "Could not load live scores.";
            }
        }

        // Fetch immediately and every 60 seconds
        fetchLiveScores();
        setInterval(fetchLiveScores, 60000);
    </script>

</body>
</html>
