<!DOCTYPE html>
<html>
<head>
    <title>My Football Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(green, black);
            color: white;
        }

        .navbar {
            background: black;
            padding: 15px;
            text-align: center;
        }

        .navbar a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        .navbar a:hover {
            color: lime;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        .card {
            background: rgba(0,0,0,0.6);
            margin: 20px;
            padding: 20px;
            border-radius: 10px;
        }

        img {
            width: 150px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <a href="#">Home</a>
        <a href="#">Players</a>
        <a href="#">Scores</a>
    </div>

    <div class="container">
        <h1>⚽ My Football Website ⚽</h1>

        <div class="card">
            <h2>🔥 Top Player</h2>
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/8c/Cristiano_Ronaldo_2018.jpg">
            <p>Cristiano Ronaldo</p>
        </div>

        <div class="card">
            <h2>📊 Latest Score</h2>
            <p>Barcelona 6 - 2 Newcastle</p>
        </div>

        <div class="card">
            <h2>📢 News</h2>
            <p>Big match coming this weekend!</p>
        </div>
    </div>

</body>
</html>
