<!DOCTYPE html>
<html>
<head>
    <title>My Football Website</title>

    <style>
        <script>
const apiKey = "YOUR_API_KEY_HERE"; // <-- Replace this with your actual API key
const matchId = 264673; // <-- Example match ID (you can change to any match from API)

// Function to fetch live score
async function fetchLiveScore() {
    try {
        const response = await fetch(`https://api.football-data.org/v4/matches/${matchId}`, {
            headers: { 'X-Auth-Token': apiKey }
        });
        const data = await response.json();
        
        // Get home & away team names and scores
        const homeTeam = data.match.homeTeam.name;
        const awayTeam = data.match.awayTeam.name;
        const homeScore = data.match.score.fullTime.home;
        const awayScore = data.match.score.fullTime.away;

        // Update your page
        document.getElementById("live-score").innerText = `${homeTeam} ${homeScore} - ${awayScore} ${awayTeam} ⚽🔥`;

    } catch (error) {
        console.error("Error fetching score:", error);
        document.getElementById("live-score").innerText = "Could not load live score.";
    }
}

// Fetch score every 60 seconds
fetchLiveScore();
setInterval(fetchLiveScore, 60000);
</script>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(green, black);
            color: white;
            transition: 0.5s;<div class="card">
    <h2>📊 Live Score</h2>
    <p id="live-score">Loading live scores...</p>
</div>
        }

        .light-mode {
            background: white;
            color: black;
        }

        .navbar {
            background: black;
            padding: 15px;
            text-align: center;
        }

        .navbar a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        .card {
            background: rgba(0,0,0,0.6);
            margin: 20px;
            padding: 20px;
            border-radius: 10px;
        }

        button {
            padding: 10px;
            border: none;
            background: lime;
            font-weight: bold;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>

<body id="body">

    <div class="navbar">
        <a href="index.html">Home</a>
        <a href="players.html">Players</a>
        <a href="scores.html">Scores</a>
    </div>

    <div class="container">
        <h1>⚽ My Football Website ⚽</h1>

        <div class="card">
            <h2>📊 Live Score</h2>
            <p id="score">Barcelona 1 - 1 Newcastle</p>
            <button onclick="updateScore()">Update Score</button>
        </div>

        <div class="card">
            <h2>🌙 Theme</h2>
            <button onclick="toggleMode()">Toggle Dark/Light Mode</button>
        </div>
    </div>

    <script>
        function updateScore() {
            document.getElementById("score").innerHTML = "Barcelona 2 - 1 Newcastle ⚽🔥";
        }

        function toggleMode() {
            document.getElementById("body").classList.toggle("light-mode");
        }
    </script>

</body>
</html>
