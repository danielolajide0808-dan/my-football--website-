<!DOCTYPE html>
<html>
<head>
    <title>Top Football Players</title>
    <style>
        body {
            background: black;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            transition: 0.5s;
        }

        .light-mode {
            background: white;
            color: black;
        }

        .navbar {
            background: black;
            padding: 15px;
        }

        .navbar a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        .navbar a:hover {
            color: lime;
        }

        h1 {
            margin-top: 20px;
        }

        .player-card {
            display: inline-block;
            background: rgba(0,0,0,0.7);
            margin: 15px;
            padding: 20px;
            border-radius: 10px;
            width: 200px;
        }

        .player-card img {
            width: 150px;
            border-radius: 10px;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            border: none;
            background: lime;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }

    </style>
</head>

<body id="body">

    <div class="navbar">
        <a href="index.html">Home</a>
        <a href="players.html">Players</a>
        <a href="scores.html">Scores</a>
    </div>

    <h1>⚽ Top Players ⚽</h1>

    <!-- Player Cards -->
    <div class="player-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/8c/Cristiano_Ronaldo_2018.jpg" alt="Cristiano Ronaldo">
        <h3>Cristiano Ronaldo</h3>
        <p>Portuguese forward, one of the greatest footballers.</p>
    </div>

    <div class="player-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/89/Portrait_Lionel_Messi.jpg" alt="Lionel Messi">
        <h3>Lionel Messi</h3>
        <p>Argentine forward, known for incredible dribbling and goals.</p>
    </div>

    <div class="player-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Kylian_Mbapp%C3%A9_2019.jpg" alt="Kylian Mbappé">
        <h3>Kylian Mbappé</h3>
        <p>French forward, super fast and young superstar.</p>
    </div>

    <!-- Dark / Light Mode Button -->
    <div>
        <button onclick="toggleMode()">Toggle Dark/Light Mode</button>
    </div>

    <script>
        // Dark / Light Mode
        function toggleMode() {
            document.getElementById("body").classList.toggle("light-mode");
        }
    </script>

</body>
</html>
